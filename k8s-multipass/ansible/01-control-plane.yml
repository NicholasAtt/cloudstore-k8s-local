# 01-control-plane.yml — initialise the Kubernetes control plane with kubeadm
---
- name: Initialise Kubernetes control plane
  hosts: control_plane
  become: true
  vars:
    pod_network_cidr: "10.244.0.0/16"   # required by Flannel CNI
    flannel_manifest: "https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"

  tasks:

    - name: Check if control plane is already initialised
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_init_done

    - name: Run kubeadm init
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr }}
        --apiserver-advertise-address={{ ansible_host }}
        --control-plane-endpoint={{ ansible_host }}
        --ignore-preflight-errors=NumCPU
      when: not kubeadm_init_done.stat.exists
      register: kubeadm_init_output

    # ── kubeconfig for ubuntu user ────────────────────────────────────────────
    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy admin.conf to ubuntu's kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    # ── CNI: Flannel ──────────────────────────────────────────────────────────
    - name: Install Flannel CNI
      become: false
      command: kubectl apply -f {{ flannel_manifest }}
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config

    - name: Write Flannel host-agnostic node IP patch
      copy:
        dest: /tmp/flannel-nodeip-patch.yaml
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          spec:
            template:
              spec:
                containers:
                  - name: kube-flannel
                    env:
                      - name: NODE_IP
                        valueFrom:
                          fieldRef:
                            fieldPath: status.hostIP
                    args:
                      - --ip-masq
                      - --kube-subnet-mgr
                      - --iface=$(NODE_IP)
                      - --public-ip=$(NODE_IP)

    - name: Configure Flannel to use Kubernetes node InternalIP
      become: false
      command: >
        kubectl -n kube-flannel patch daemonset kube-flannel-ds
        --type=strategic
        --patch-file /tmp/flannel-nodeip-patch.yaml
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: flannel_patch
      changed_when: "'patched (no change)' not in flannel_patch.stdout"

    - name: Wait for Flannel rollout after node IP patch
      become: false
      command: kubectl -n kube-flannel rollout status daemonset/kube-flannel-ds --timeout=180s
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      changed_when: false

    # ── Join command ──────────────────────────────────────────────────────────
    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Save join command locally for the worker play
      copy:
        content: "{{ join_command_raw.stdout }}\n"
        dest: /tmp/k8s_join_command.sh
        mode: '0600'
      delegate_to: localhost
      become: false

    # ── Sanity check ──────────────────────────────────────────────────────────
    - name: Show cluster nodes (control plane should be Ready)
      become: false
      command: kubectl get nodes
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      register: nodes_output
      changed_when: false

    - name: Print node status
      debug:
        msg: "{{ nodes_output.stdout_lines }}"
