apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cloudstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        cloudstore.role: data
      containers:
        - name: redis
          image: redis:8.6.1
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cloudstore
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
