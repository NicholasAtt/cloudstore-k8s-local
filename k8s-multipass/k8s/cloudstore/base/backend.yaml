apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloudstore
spec:
  replicas: 2
  progressDeadlineSeconds: 1200
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        cloudstore.role: app
      initContainers:
        - name: wait-for-data-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
              until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
      containers:
        - name: backend
          image: ghcr.io/nicholasatt/cloudstore-k8s-local-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
          envFrom:
            - configMapRef:
                name: cloudstore-config
            - secretRef:
                name: cloudstore-secret
          readinessProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          startupProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 9999
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cloudstore
spec:
  selector:
    app: backend
  ports:
    - port: 9999
      targetPort: 9999
