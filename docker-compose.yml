services:
  mysql:
    image: mysql:8.0.45
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:?set DB_NAME}
      MYSQL_USER: ${DB_USER:?set DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    command: --port=${DB_PORT:?set DB_PORT}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -P \"$${DB_PORT}\" -u root -p\"$${MYSQL_ROOT_PASSWORD}\""]
      timeout: 20s
      retries: 10
    networks:
      - cloudstore-network

  server:
    build:
      context: ./src/main/java/com/cloudstore/server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:?set DB_PORT}
      DB_NAME: ${DB_NAME:?set DB_NAME}
      DB_USER: ${DB_USER:?set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE:-PREFERRED}
      DB_SERVER_TIMEZONE: ${DB_SERVER_TIMEZONE:-UTC}
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: ${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:-true}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:?set JWT_EXPIRATION_MS}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      SERVER_BIND_ADDRESS: ${SERVER_BIND_ADDRESS:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-9999}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:?set RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_TLS_ENABLED: ${RABBITMQ_TLS_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-9999}:${SERVER_PORT:-9999}"
    networks:
      - cloudstore-network
    restart: unless-stopped

  order-worker:
    build:
      context: ./src/main/java/com/cloudstore/server
      dockerfile: Dockerfile
    command: ["java", "-cp", "/app/classes:/app/dependency/*", "com.cloudstore.server.messaging.OrderWorkerApplication"]
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:?set DB_PORT}
      DB_NAME: ${DB_NAME:?set DB_NAME}
      DB_USER: ${DB_USER:?set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE:-PREFERRED}
      DB_SERVER_TIMEZONE: ${DB_SERVER_TIMEZONE:-UTC}
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: ${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:-true}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:?set RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_TLS_ENABLED: ${RABBITMQ_TLS_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudstore-network
    restart: unless-stopped

  redis:
    image: redis:8.6.1   
    container_name: redis  
    volumes:
      - redis_data:/data
    networks:
      - cloudstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?set RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    networks:
      - cloudstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./src/client
      dockerfile: Dockerfile
    environment:
      BACKEND_SCHEME: ${BACKEND_SCHEME:-http}
      BACKEND_HOST: server
      BACKEND_PORT: ${SERVER_PORT:-9999}
    depends_on:
      - server
    ports:
      - "8501:8501"
    networks:
      - cloudstore-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis_data:

networks:
  cloudstore-network:
    driver: bridge